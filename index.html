<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocAgent — Вход</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --text: #e8eaf6; --muted: #7986a3; --accent: #5c6bc0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 36px; width: 360px;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #5c6bc0, #7c4dff);
    display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .logo-text { font-size: 18px; font-weight: 700; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input[type=password] {
    width: 100%; background: #12141e; border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text);
    font-size: 14px; outline: none; transition: border-color .15s;
  }
  input[type=password]:focus { border-color: var(--accent); }
  .btn {
    width: 100%; margin-top: 16px; padding: 12px;
    background: linear-gradient(135deg, #5c6bc0, #7c4dff);
    color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .88; }
  .error {
    margin-top: 12px; padding: 10px 14px;
    background: rgba(239,83,80,.12); border: 1px solid rgba(239,83,80,.3);
    border-radius: 8px; font-size: 13px; color: #ef5350;
    display: none;
  }
  .error.show { display: block; }
  .footer { margin-top: 24px; text-align: center; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">DocAgent</div>
      <div class="logo-sub">AI Документооборот</div>
    </div>
  </div>

  <form onsubmit="login(event)">
    <label for="pwd">Пароль доступа</label>
    <input type="password" id="pwd" placeholder="Введите пароль" autofocus autocomplete="current-password">
    <button class="btn" type="submit">Войти →</button>
    <div class="error" id="err">Неверный пароль. Попробуйте ещё раз.</div>
  </form>

  <div class="footer">Доступ только для авторизованных пользователей</div>
</div>

<script>
  const HASH = "8211656a21452a6e6f673c45a99c4335f0196948fa89c8fee49590b4d49b6a34";

  function sha256(str) {
    const buf = new TextEncoder().encode(str);
    return crypto.subtle.digest("SHA-256", buf).then(h =>
      Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2,"0")).join("")
    );
  }

  if (sessionStorage.getItem("docagent_auth") === "1") {
    location.replace("prototype.html");
  }

  async function login(e) {
    e.preventDefault();
    const val = document.getElementById("pwd").value;
    const hash = await sha256(val);
    if (hash === HASH) {
      sessionStorage.setItem("docagent_auth", "1");
      location.replace("prototype.html");
    } else {
      document.getElementById("err").classList.add("show");
      document.getElementById("pwd").value = "";
      document.getElementById("pwd").focus();
    }
  }
</script>
</body>
</html>
